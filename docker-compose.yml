services:
  # OpenSearch for RAG vector database
  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: opensearch
    environment:
      - discovery.type=single-node
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - docling-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Ollama for local LLM (Note: Ollama should be run on host machine)
  # This is a placeholder - Ollama is typically run directly on the host
  # Use host.docker.internal to connect from containers to host Ollama

  # CPU version with RAG support
  docling-factory-cpu:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docling-factory-cpu
    ports:
      - "7860:7860"
    volumes:
      - ./input:/app/input
      - ./output:/app/output
      - ./logs:/app/logs
    environment:
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
      - PYTHONUNBUFFERED=1
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    networks:
      - docling-network
    depends_on:
      opensearch:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:7860')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # GPU version with RAG support (requires nvidia-docker)
  docling-factory-gpu:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    container_name: docling-factory-gpu
    ports:
      - "7861:7860"
    volumes:
      - ./input:/app/input
      - ./output:/app/output
      - ./logs:/app/logs
    environment:
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
      - PYTHONUNBUFFERED=1
      - CUDA_VISIBLE_DEVICES=0
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    networks:
      - docling-network
    depends_on:
      opensearch:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:7860')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    profiles:
      - gpu

volumes:
  opensearch-data:
    driver: local
  input:
    driver: local
  output:
    driver: local
  logs:
    driver: local

networks:
  docling-network:
    driver: bridge

